<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ian Bremmer Soundboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

 <h1>Press the keys<h1>
  <div class="keys">

    <div  onclick="document.getElementById('sound1').play();" data-key="65" class="key">
      <kbd>A</kbd>
      <span class="sound">ready</span>
    </div>
    <div onclick="document.getElementById('sound2').play();" data-key="83" class="key">
      <kbd>S</kbd>
      <span class="sound">no</span>
    </div>
    <div onclick="document.getElementById('sound3').play();" data-key="68" class="key">
      <kbd>D</kbd>
      <span class="sound">g-zero</span>
    </div>
    <div onclick="document.getElementById('sound4').play();" data-key="70" class="key">
      <kbd>F</kbd>
      <span class="sound">hey</span>
    </div>
    <div onclick="document.getElementById('sound5').play();" data-key="71" class="key">
      <kbd>G</kbd>
      <span class="sound">geo</span>
    </div>
   <div onclick="document.getElementById('sound6').play();" data-key="72" class="key">
    <kbd>H</kbd>
      <span class="sound">us</span>
    </div>
     <div onclick="document.getElementById('sound7').play();" data-key="74" class="key">
      <kbd>J</kbd>
      <span class="sound">get</span>
    </div>
      <!--<div data-key="75" class="key">
      <kbd>K</kbd>
      <span class="sound">get</span>
    </div>
  <div data-key="76" class="key">
      <kbd>L</kbd>
      <span class="sound">tink</span>
    </div> -->
  </div>

  <audio id="sound1" data-key="65" src="ian/ready-lets-go.wav"></audio>
  <audio id="sound2" data-key="83" src="ian/no-no-no.wav"></audio>
  <audio id="sound3" data-key="68" src="ian/gzero-world.wav"></audio>
  <audio id="sound4" data-key="70" src="ian/hey-everybody.wav"></audio>
  <audio id="sound5" data-key="71" src="ian/geopolitically.wav"></audio>
  <audio id="sound6" data-key="72" src="ian/wheres-the-us.wav"></audio>
  <audio id="sound7" data-key="74" src="ian/get-through-it.wav"></audio>
 <!-- <audio data-key="75" src=""></audio>
   <audio data-key="76" src="sounds/tink.wav"></audio> -->

<script>

function removeTransition(e){
	if (e.propertyName !== 'transform') return;
	e.target.classList.remove('playing');
};


function playSound(e){
	const audio = document.querySelector(`audio[data-key="${e.keyCode}"]`);
	const key = document.querySelector(`div[data-key="${e.keyCode}"]`);
	if(!audio) return; //stops audio from running if wrong key is hit
	
	key.classList.add('playing');
	audio.currentTime = 0; //rewinds to start
	audio.play();	
};



	const keys = Array.from(document.querySelectorAll('.key'));
	keys.forEach(key => key.addEventListener('transitionend', removeTransition));
window.addEventListener('keydown', playSound);


</script>

</body>
</html>
