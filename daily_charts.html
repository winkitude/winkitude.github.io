<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="utf-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
  <title>Ari Winkleman - Daily Charts Archive</title>
  <meta name="description" content="Ari Winkleman - Daily Charts Archive" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <link rel="shortcut icon" href="favicon.ico" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link href="css/normalize.css" rel="stylesheet" />
  <link href="css/screen.css?v=10" rel="stylesheet" />

  <style>
    .search { padding: 12px 0 0; }
    .search input[type="text"] {
      display: block;
      width: 100%;
      font: 400 16px/1.2 'Poppins', Arial, sans-serif;
      padding: 12px 14px;
      border: 1px solid #ccc;
      border-radius: 6px;
    }

    .gallery {
      padding: 22px 0 70px;
    }

    .gallery .grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 22px;
    }

    .tile {
      display: block;
      text-decoration: none;
      color: inherit;
    }

    .tile-media {
      position: relative;
      overflow: hidden;
      border-radius: 8px;
      background: #eee;
      transform: translateZ(0);
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
    }

    .tile-media::before {
      content: "";
      display: block;
      aspect-ratio: 1 / 1;
    }

    .tile img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      transition: transform .25s ease;
      background: #fff;
    }

    .tile:hover img {
      transform: scale(1.03);
    }

    .sr-only,
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .empty-state {
      font: 400 15px/1.5 'Poppins', Arial, sans-serif;
      color: #666;
      padding: 18px 0;
    }

    .lightbox {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.88);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      z-index: 2000;
    }

    .lightbox.is-open {
      display: flex;
    }

    .lightbox-inner {
      position: relative;
      max-width: min(1100px, 92vw);
      max-height: 90vh;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .lightbox img {
      max-width: 100%;
      max-height: 90vh;
      width: auto;
      height: auto;
      display: block;
      background: #fff;
      box-shadow: 0 12px 36px rgba(0,0,0,.25);
    }

    .lightbox-close {
      position: absolute;
      top: -14px;
      right: -14px;
      width: 40px;
      height: 40px;
      border: 0;
      border-radius: 999px;
      background: #fff;
      color: #111;
      font: 600 18px/1 'Poppins', Arial, sans-serif;
      cursor: pointer;
    }

    .sticky-foot {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 1000;
      background: #fff;
      border-top: 1px solid #ccc;
      padding: 10px 0;
      text-align: center;
    }

    .sticky-foot a {
      text-decoration: none;
      color: inherit;
      font-family: 'Poppins', Arial, sans-serif;
    }

    @media (max-width: 1080px) {
      .gallery .grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 18px;
      }
    }

    @media (max-width: 640px) {
      .gallery .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <a class="skip" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="wrap" style="display:flex; justify-content:space-between; align-items:center;">
      <div class="masthead">
        <a href="index.html">Ari Winkleman</a>
      </div>

      <div class="contact-icons" style="display:flex; gap:16px; align-items:center;">
        <a href="https://www.linkedin.com/in/ari-winkleman/" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
            <path d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.76 2.24 5 5 5h14c2.76 0 5-2.24 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-10h3v10zm-1.5-11.27c-.97 0-1.75-.79-1.75-1.76 0-.97.78-1.76 1.75-1.76s1.75.79 1.75 1.76c0 .97-.78 1.76-1.75 1.76zm13.5 11.27h-3v-5.6c0-1.34-.03-3.07-1.87-3.07-1.87 0-2.16 1.46-2.16 2.97v5.7h-3v-10h2.88v1.36h.04c.4-.75 1.38-1.54 2.84-1.54 3.04 0 3.6 2 3.6 4.6v5.6z"/>
          </svg>
        </a>

        <a href="mailto:ariswinkleman@gmail.com" aria-label="Email">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 13.065l-11.99-7.065h23.98l-11.99 7.065zm0 2.935l-12-7.065v11.065h24v-11.065l-12 7.065z"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <br><br>

  <main id="main">
    <section class="intro">
      <div class="wrap">
        <h2 class="prelede">Daily Charts</h2>
        <p class="lede">
          A running archive of my daily chart work. A mix of geopolitics, sports, culture, and whatever else I feel like charting that day.
        </p>
        <br><br>
      </div>
    </section>

    <hr class="rule" />

    <section class="search">
      <div class="wrap">
        <label for="searchInput" class="visually-hidden">Search charts</label>
        <input id="searchInput" type="text" placeholder="Search charts…" autocomplete="off" />
      </div>
    </section>

    <section class="gallery">
      <div class="wrap">
        <div id="articles" class="grid" aria-live="polite"></div>
      </div>
    </section>

    <div id="lightbox" class="lightbox" aria-hidden="true" role="dialog" aria-modal="true" aria-label="Expanded chart view">
      <div class="lightbox-inner">
        <button id="lightboxClose" class="lightbox-close" type="button" aria-label="Close expanded chart">×</button>
        <img id="lightboxImage" src="" alt="" />
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="wrap">
      <small class="dek" style="color:#6b6b6b;">&copy; <span id="year"></span> Ari Winkleman</small>
    </div>
  </footer>

  <div class="sticky-foot">
    <div class="wrap">
      <a href="index.html"><p class="dek">Back to homepage &rarr;</p></a>
    </div>
  </div>

  <script>
    document.getElementById('year').textContent = new Date().getFullYear();

    const $grid = document.getElementById('articles');
    const $q = document.getElementById('searchInput');
    const $lightbox = document.getElementById('lightbox');
    const $lightboxImage = document.getElementById('lightboxImage');
    const $lightboxClose = document.getElementById('lightboxClose');

    function render(data, query) {
      const term = (query || '').trim().toLowerCase();
      $grid.innerHTML = '';

      const filtered = !term ? data : data.filter(d => {
        const keys = Array.isArray(d.keywords) ? d.keywords.join(' ') : String(d.keywords || '');
        const hiddenTitle = String(d.accessibility_title || d.title || '');
        return (keys + ' ' + hiddenTitle).toLowerCase().includes(term);
      });

      if (!filtered.length) {
        $grid.innerHTML = '<p class="empty-state">No charts matched your search.</p>';
        return;
      }

      for (const item of filtered) {
        const el = document.createElement(item.article_url ? 'a' : 'div');
        el.className = 'tile';

        if (item.article_url) {
          el.href = item.article_url;
          el.target = '_blank';
          el.rel = 'noopener';
        } else {
          el.setAttribute('role', 'button');
          el.setAttribute('tabindex', '0');
        }

        const imageSrc = (item.image || '').startsWith('http')
          ? item.image
          : 'images/daily_charts/' + (item.image || '');

        const accessibilityTitle = item.accessibility_title || item.title || 'Daily chart';
        const accessibilityDescription = item.accessibility_description || item.alt || '';
        const ariaLabel = accessibilityDescription
          ? `${accessibilityTitle}. ${accessibilityDescription}`
          : accessibilityTitle;

        el.setAttribute('aria-label', ariaLabel);

        el.innerHTML = `
          <div class="tile-media">
            <img src="${imageSrc}" alt="${ariaLabel}" loading="lazy">
          </div>
          <span class="sr-only">${ariaLabel}</span>
        `;

        if (!item.article_url) {
          el.addEventListener('click', () => openLightbox(imageSrc, ariaLabel));
          el.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
              e.preventDefault();
              openLightbox(imageSrc, ariaLabel);
            }
          });
        }

        $grid.appendChild(el);
      }
    }

    function openLightbox(src, alt) {
      $lightboxImage.src = src;
      $lightboxImage.alt = alt || 'Expanded daily chart';
      $lightbox.classList.add('is-open');
      $lightbox.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
      $lightboxClose.focus();
    }

    function closeLightbox() {
      $lightbox.classList.remove('is-open');
      $lightbox.setAttribute('aria-hidden', 'true');
      $lightboxImage.src = '';
      $lightboxImage.alt = '';
      document.body.style.overflow = '';
    }

    $lightboxClose.addEventListener('click', closeLightbox);
    $lightbox.addEventListener('click', (e) => {
      if (e.target === $lightbox) closeLightbox();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && $lightbox.classList.contains('is-open')) {
        closeLightbox();
      }
    });

    fetch('daily_charts_data.json')
      .then(r => r.json())
      .then(data => {
        data.sort((a, b) => new Date(b.date) - new Date(a.date));

        render(data, '');
        $q.addEventListener('input', (e) => render(data, e.target.value));
      })
      .catch(err => {
        console.error('Error loading charts:', err);
        $grid.innerHTML = '<p class="empty-state">Sorry, the archive failed to load.</p>';
      });
  </script>

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-8FK0VXYYGX"></script>

</body>
</html>
