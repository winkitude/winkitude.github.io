<!doctype html>
<html lang="en">

<link rel="preconnect" href="https://fonts.googleapis.com">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#ffffff;
    --fg:#111827;
    --hair:rgba(17,24,39,.10);
    --muted:rgba(17,24,39,.62);
    --accent:#d21f2b;
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:"Poppins", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  }

  .wrap{ max-width:1200px; margin:0 auto; padding:0 18px; }

  /* Header icon sizing override for this combined page */
  header .contact-icons svg{ width:16px !important; height:16px !important; display:block; }
  header .contact-icons{ gap:12px !important; }

  main{ padding:26px 0 44px; }

  .hero{ text-align:center; margin:12px auto 18px; }
  .title{
    font-family:"adobe-caslon-pro", serif;
    font-size:44px;
    line-height:1.05;
    font-weight:600;
    margin:0;
  }
  .subtitle{
    margin-top:8px;
    font-size:14px;
    font-weight:800;
    color:rgba(17,24,39,.78);
  }

  .sectionHead{
    text-align:center;
    margin:34px auto 10px;
    font-weight:800;
    font-size:12px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:rgba(17,24,39,.70);
  }

  .frameWrap{
    border-top:1px solid rgba(17,24,39,.06);
    margin-top:10px;
  }

  iframe{
    width:100%;
    border:0;
    display:block;
  }

  /* generous heights so the page scrolls normally (no inner iframe scrollbars) */
  #ridgeFrame{ height:4200px; }
  #heatFrame{ height:2200px; }

  @media (max-width: 820px){
    .title{ font-size:34px; }
    #ridgeFrame{ height:5200px; }
    #heatFrame{ height:2600px; }
  }

  .note{
    text-align:center;
    font-size:12px;
    color:rgba(17,24,39,.58);
    margin-top:10px;
  }
</style>
</head>

<body>
<header class="site-header">
  <div class="wrap" style="display:flex; justify-content:space-between; align-items:center;">
    <!-- Left side -->
    <div class="masthead">
      <a href="../index.html">Ari Winkleman</a>
    </div>

    <!-- Right side: icons -->
    <div class="contact-icons" style="display:flex; gap:16px; align-items:center;">
      <!-- LinkedIn -->
      <a href="https://www.linkedin.com/in/ari-winkleman/" target="_blank" rel="noopener" aria-label="LinkedIn">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 24 24">

      <!-- Email -->
      <a href="mailto:ariswinkleman@gmail.com" aria-label="Email">

          <path d="M12 13.065l-11.99-7.065h23.98l-11.99 7.065zm0

    </div>
  </div>
</header>

<main>
  <div class="wrap">
    <section class="hero">
      <h1 class="title">The NHL's 50 Goal Club</h1>
      <div class="subtitle">Ridgeline view + heatmap view from the same dataset</div>
    </section>

    <div class="sectionHead">Ridgeline (sorted by earliest 50-goal season)</div>
    <div class="frameWrap">
      <iframe id="ridgeFrame" src="nhl-50-goals.html" title="Ridgeline chart"></iframe>
    </div>

    <div class="sectionHead">Heatmap (sorted by total career goals)</div>
    <div class="frameWrap">
      <iframe id="heatFrame" src="nhl-50-goals_heatmap_v7.html" title="Heatmap chart"></iframe>
    </div>

    <div class="note">
      If you want these to auto-fit height perfectly, we can wire up a small postMessage resize script.
    </div>
  </div>
</main>

</body>
</html>
