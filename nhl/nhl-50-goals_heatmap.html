<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>NHL 50 Goal Club Heatmap</title>

<link rel="stylesheet" href="https://use.typekit.net/hty3kgh.css">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
  :root{
    --bg:#ffffff;
    --fg:#111827;
    --hair:rgba(17,24,39,.10);
    --accent:#d21f2b;
  }

  body{
    margin:0;
    background:var(--bg);
    color:var(--fg);
    font-family:"Poppins", ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
  }

  .wrap{ max-width:1200px; margin:0 auto; padding:0 18px; }

  .site-header{ background:#fff; border-bottom:1px solid var(--hair); }
  .site-header .wrap{
    display:flex; justify-content:space-between; align-items:center; padding:14px 18px;
  }
  .masthead a{
    text-decoration:none; color:var(--fg);
    font-family:"adobe-caslon-pro", serif;
    font-size:20px; line-height:1; font-weight:600; letter-spacing:.1px;
  }
  .contact-icons{ display:flex; gap:12px; align-items:center; }
  .contact-icons a{ color:rgba(17,24,39,.78); text-decoration:none; }
  .contact-icons a:hover{ color:rgba(17,24,39,.95); }

  main{ padding:28px 0 42px; }

  .hero{ text-align:center; margin:10px auto 18px; }
  .title{
    font-family:"adobe-caslon-pro", serif;
    font-size:44px; line-height:1.05; font-weight:600; margin:0;
  }
  .subtitle{
    margin-top:8px; font-size:14px; font-weight:800; color:rgba(17,24,39,.78);
  }

  .legendRow{ display:flex; justify-content:center; margin:16px 0 8px; }
  .legend{
    display:flex; align-items:center; gap:10px;
    padding:8px 10px; border:1px solid rgba(17,24,39,.10); border-radius:12px;
    background:rgba(255,255,255,.92);
    font-size:12px; color:rgba(17,24,39,.70);
  }
  .legendBar{
    width:160px; height:10px; border-radius:999px;
    background:linear-gradient(90deg, #e9f7ec, #0b7a2c);
    border:1px solid rgba(17,24,39,.12);
  }

  .chart{
    margin-top:10px;
    overflow:auto;
    -webkit-overflow-scrolling:touch;
    border-top:1px solid rgba(17,24,39,.06);
    padding-bottom:6px;
  }

  svg{ display:block; width:100%; height:auto; background:#fff; min-width:1200px; }

  .axis text{
    fill:rgba(17,24,39,.55);
    font-size:11px;
    font-family:"Poppins", ui-sans-serif;
  }
  .axis path,.axis line{ stroke:rgba(17,24,39,.10); }

  .vgrid{ stroke:rgba(17,24,39,.10); stroke-width:1; shape-rendering:crispEdges; }
  .hgrid{ stroke:rgba(17,24,39,.06); stroke-width:1; shape-rendering:crispEdges; }

  .name{
    font-size:11px; fill:rgba(17,24,39,.92);
    text-anchor:end;
  }
  .name.active{ font-weight:800; }

  .cell{
    shape-rendering:crispEdges;
    stroke:rgba(17,24,39,.06);
    stroke-width:1;
  }
  .cell.empty{ fill:#fff; }
  .cell.zero{ fill:#fff; }

  .cell:hover{
    stroke:rgba(17,24,39,.45);
    stroke-width:1;
  }

  .cellLabel{
    font-size:9px;
    font-weight:700;
    pointer-events:none;
    user-select:none;
    dominant-baseline:middle;
    fill:rgba(17,24,39,.78);
  }

  .tooltip{
    position:fixed;
    pointer-events:none;
    background:rgba(255,255,255,.96);
    border:1px solid rgba(17,24,39,.18);
    color:rgba(17,24,39,.95);
    padding:10px 12px;
    border-radius:12px;
    font-size:12px;
    line-height:1.35;
    transform:translate(12px,12px);
    display:none;
    max-width:320px;
    box-shadow:0 10px 30px rgba(0,0,0,.10);
  }
  .tipName{ font-weight:800; margin-bottom:2px; }
  .tipSmall{ color:rgba(17,24,39,.58); }

  .footnote{
    text-align:center;
    font-size:12px;
    color:rgba(17,24,39,.58);
    margin-top:12px;
  }
  .footnote a{
    color:rgba(17,24,39,.72);
    text-decoration:none;
    border-bottom:1px solid rgba(17,24,39,.25);
  }
  .footnote a:hover{ border-bottom:1px solid rgba(17,24,39,.60); }

  @media (max-width: 820px){
    .title{ font-size:34px; }
    svg{ width:1100px; }
  }
</style>
</head>

<body>
  <header class="site-header">
    <div class="wrap">
      <div class="masthead">
        <a href="../index.html">Ari Winkleman</a>
      </div>

      <div class="contact-icons">
        <a href="https://www.linkedin.com/in/ari-winkleman/" target="_blank" rel="noopener" aria-label="LinkedIn">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M19 0h-14c-2.76 0-5 2.24-5 5v14c0 2.76 2.24 5 5 5h14c2.76 0 5-2.24 5-5v-14c0-2.76-2.24-5-5-5zm-11 19h-3v-10h3v10zm-1.5-11.27c-.97 0-1.75-.79-1.75-1.76 0-.97.78-1.76 1.75-1.76s1.75.79 1.75 1.76c0 .97-.78 1.76-1.75 1.76zm13.5 11.27h-3v-5.6c0-1.34-.03-3.07-1.87-3.07-1.87 0-2.16 1.46-2.16 2.97v5.7h-3v-10h2.88v1.36h.04c.4-.75 1.38-1.54 2.84-1.54 3.04 0 3.6 2 3.6 4.6v5.6z"/>
          </svg>
        </a>

        <a href="mailto:ariswinkleman@gmail.com" aria-label="Email">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" fill="currentColor" viewBox="0 0 24 24">
            <path d="M12 13.065l-11.99-7.065h23.98l-11.99 7.065zm0 2.935l-12-7.065v11.065h24v-11.065l-12 7.065z"/>
          </svg>
        </a>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <section class="hero">
        <h1 class="title">The NHL's 50 Goal Club</h1>
        <div class="subtitle">Heatmap of goals by age. Sorted by total career goals</div>
      </section>

      <div class="legendRow">
        <div class="legend" aria-label="Legend">
          <span>Goals per season (0 shown as blank)</span>
          <span class="legendBar" aria-hidden="true"></span>
          <span>Low</span>
          <span>High</span>
        </div>
      </div>

      <div class="chart">
        <svg id="svg" viewBox="0 0 1200 900" preserveAspectRatio="xMinYMin meet"></svg>
      </div>

      <div class="footnote">
        Ages shown are approximate and reflect the player’s age at roughly the start of each season.
        Source:
        <a href="https://en.wikipedia.org/wiki/List_of_NHL_players_with_50-goal_seasons" target="_blank" rel="noopener">
          Wikipedia. List of NHL players with 50-goal seasons
        </a>
      </div>
    </div>
  </main>

  <div class="tooltip" id="tooltip"></div>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script>
  (async function(){
    const svg = d3.select("#svg");
    const tooltip = d3.select("#tooltip");

    const ages = d3.range(18, 46).map(String);

    const isActiveCell = (v) => {
      const s = String(v ?? "").trim().toLowerCase();
      return s === "y" || s === "yes" || s === "true" || s === "1";
    };

    const parseRow = (d) => {
      const row = {
        name: d["Name"],
        total: +d["Total Goals"] || 0,
        active: isActiveCell(d["Active"])
      };

      let peak = 0;

      ages.forEach(a => {
        const v = d[a];
        const val = (v === undefined || v === null || v === "") ? null : +v;
        row[a] = (Number.isFinite(val) ? val : null);
        if (row[a] !== null && row[a] > peak) peak = row[a];
      });

      row.peak = peak;
      return row;
    };

    const dataRaw = await d3.csv("nhl_50.csv", parseRow);

    const data = dataRaw
      .slice()
      .sort((a,b) => d3.descending(a.total, b.total) || d3.descending(a.peak, b.peak));

    const W = 1200;
    const leftNamesW = 290;
    const rightPad = 22;
    const topPad = 26;
    const bottomPad = 56;

    const innerW = W - leftNamesW - rightPad;

    const cellW = innerW / (46 - 18); 
    const cellH = 14;

    const H = topPad + data.length * cellH + bottomPad;
    svg.attr("viewBox", `0 0 ${W} ${H}`);

    const x = d3.scaleLinear()
      .domain([18, 45])
      .range([leftNamesW, leftNamesW + innerW]);

    const maxGoals = d3.max(data, d => d3.max(ages, a => d[a] ?? 0)) || 0;

    const color = d3.scaleLinear()
      .domain([1, Math.max(1, maxGoals)])
      .range(["#e9f7ec", "#0b7a2c"])
      .interpolate(d3.interpolateRgb)
      .clamp(true);

    const g = svg.append("g");

    const gridAges = [20, 25, 30, 35, 40, 45];

    g.append("g")
      .selectAll("line.vgrid")
      .data(gridAges)
      .enter()
      .append("line")
        .attr("class","vgrid")
        .attr("x1", d => x(d))
        .attr("x2", d => x(d))
        .attr("y1", topPad)
        .attr("y2", topPad + data.length * cellH);

    g.append("g")
      .selectAll("line.hgrid")
      .data(d3.range(0, data.length+1))
      .enter()
      .append("line")
        .attr("class","hgrid")
        .attr("x1", leftNamesW)
        .attr("x2", leftNamesW + innerW)
        .attr("y1", i => topPad + i*cellH)
        .attr("y2", i => topPad + i*cellH);

    const xAxis = d3.axisBottom(x).ticks(14).tickFormat(d3.format("d"));
    g.append("g")
      .attr("class","axis")
      .attr("transform", `translate(0,${topPad + data.length*cellH + 18})`)
      .call(xAxis);

    const rows = g.append("g")
      .selectAll("g.row")
      .data(data)
      .enter()
      .append("g")
        .attr("class","row")
        .attr("transform", (d,i)=>`translate(0,${topPad + i*cellH})`);

    rows.append("text")
      .attr("class", d => d.active ? "name active" : "name")
      .attr("x", leftNamesW - 10)
      .attr("y", cellH - 3)
      .text(d => d.name);

        const cellData = d => ages.map(a => ({ player:d, age:+a, v:d[a] }));

    const cellGroup = rows.append("g");

    cellGroup
      .selectAll("rect.cell")
      .data(cellData)
      .enter()
      .append("rect")
        .attr("class", d => (d.v === null ? "cell empty" : (d.v === 0 ? "cell zero" : "cell")))
        .attr("x", d => x(d.age) - cellW/2)
        .attr("y", 0)
        .attr("width", cellW)
        .attr("height", cellH)
        .attr("fill", d => (d.v === null || d.v === 0) ? "#ffffff" : color(d.v))
        .on("mousemove", function(event, d){
          tooltip
            .style("display","block")
            .style("left", event.clientX + "px")
            .style("top", event.clientY + "px")
            .html(
              `<div class="tipName">${d.player.name}</div>
               <div class="tipSmall">Age ${d.age}. Goals ${d.v === null ? "blank" : d.v}</div>
               <div class="tipSmall">Career goals ${d.player.total}</div>`
            );
        })
        .on("mouseleave", function(){
          tooltip.style("display","none");
        });

    // Centered value labels. Do not label 0 or blank. 50+ turns white.
    cellGroup
      .selectAll("text.cellLabel")
      .data(cellData)
      .enter()
      .append("text")
        .attr("class", "cellLabel")
        .attr("x", d => x(d.age))
        .attr("y", cellH/2)
        .attr("text-anchor", "middle")
        .attr("fill", d => (d.v !== null && d.v >= 50) ? "#ffffff" : "rgba(17,24,39,.78)")
        .text(d => (d.v === null || d.v === 0) ? "" : d.v);

  })();
  </script>
</body>
</html>
